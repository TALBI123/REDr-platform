spring.application.name=demo
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.output.ansi.enabled=always
spring.jpa.defer-datasource-initialization=true
# spring.jpa.show-sql=true
app.jwt.secret="MoSCoooooooooow-Waaaaa-MoSCoooooW-Barcaaaaaaaaaa-Waaaaa-Barcaaaaa"
app.jwt.expiration-days=30
app.sendgrid.api-key=${SENDGRID_API_KEY:SG.dev-placeholder}
app.sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@yourdomain.com}
app.sendgrid.from-name=Car Rental Platform
app.verification.base-url=${FRONTEND_URL:http://localhost:5173}
app.verification.token-expiry-hours=24
