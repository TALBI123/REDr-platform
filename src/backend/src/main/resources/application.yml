spring:
  application:
    name: demo
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
  output:
    ansi:
      enabled: ALWAYS
logging:
  level:
    org.springframework.boot.context.config: TRACE 
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32-bytes-long}
    expiration-days: ${JWT_EXPIRATION_DAYS:30}
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:}
    from-name: ${SENDGRID_FROM_NAME:REDr}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:cars}
  verification:
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8080/verification}
    token-expiry-hours: ${VERIFICATION_TOKEN_EXPIRY_HOURS:24}
  security:
    public-paths:
      - /public/**
      - /auth/login
      - /auth/register
      - /auth/refresh
      - /actuator/health
      - /swagger-ui/**
      - /v3/api-docs/**
      - /h2-console/**
